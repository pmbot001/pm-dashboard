<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PM Dashboard</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#0f172a;
      color:#e2e8f0;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',Roboto,sans-serif;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }
    a { color:inherit; text-decoration:none; }

    .header {
      background:linear-gradient(135deg,#1e3a5f 0%,#0f172a 100%);
      padding:64px 24px 40px;
      text-align:center;
    }
    .header h1 {
      font-size:36px;
      background:linear-gradient(90deg,#60a5fa,#a78bfa);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      margin-bottom:10px;
      letter-spacing:1px;
    }
    .header p { color:#94a3b8; font-size:15px; }

    .grid {
      flex:1;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:24px;
      max-width:1080px;
      width:100%;
      margin:48px auto;
      padding:0 24px;
    }

    .card {
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      background:#1e293b;
      border:1px solid #334155;
      border-radius:20px;
      padding:48px 24px;
      transition:all .25s;
      cursor:pointer;
      position:relative;
      overflow:hidden;
      min-height:260px;
      text-align:center;
    }
    .card::before {
      content:'';
      position:absolute;
      top:0; left:0; right:0;
      height:4px;
    }
    .card[data-accent="blue"]::before   { background:linear-gradient(90deg,#3b82f6,#60a5fa); }
    .card[data-accent="purple"]::before { background:linear-gradient(90deg,#8b5cf6,#a78bfa); }
    .card[data-accent="orange"]::before { background:linear-gradient(90deg,#f97316,#fbbf24); }

    .card:hover {
      border-color:#60a5fa;
      transform:translateY(-4px);
      box-shadow:0 18px 48px rgba(0,0,0,.4);
    }
    .card-icon { font-size:64px; margin-bottom:18px; line-height:1; }
    .card-title { font-size:22px; font-weight:700; margin-bottom:10px; }
    .card-desc  { font-size:13px; color:#94a3b8; line-height:1.6; max-width:240px; }
    .card-tag {
      position:absolute;
      top:14px;
      right:14px;
      background:#334155;
      color:#cbd5e1;
      font-size:10.5px;
      padding:3px 8px;
      border-radius:6px;
      font-weight:500;
    }
    .card-tag.local { background:#3b2f1a; color:#fbbf24; }

    .footer {
      text-align:center;
      padding:24px 16px 36px;
      color:#475569;
      font-size:12.5px;
    }

    @media (max-width:680px) {
      .header h1 { font-size:26px; }
      .grid { margin:32px auto; padding:0 16px; gap:16px; }
      .card { padding:36px 20px; min-height:220px; }
      .card-icon { font-size:52px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>📋 PM Dashboard</h1>
    <p>NWC 待回覆看板 · 路線圖</p>
  </div>

  <div class="grid">

    <a href="/mina-mentions.html" class="card" data-accent="blue">
      <div class="card-icon">📥</div>
      <div class="card-title">NWC 待回覆看板</div>
      <div class="card-desc">NWC 專案群中 @Mina 的訊息分類追蹤</div>
    </a>

    <a href="/nwc-roadmap.html" class="card" data-accent="purple">
      <div class="card-icon">🗺️</div>
      <div class="card-title">NWC Roadmap</div>
      <div class="card-desc">NWC 版本時程與需求路線圖</div>
    </a>

  </div>

  <div class="footer">
    PM Dashboard · 最後更新 2026-05-20
  </div>

</body>
</html>
